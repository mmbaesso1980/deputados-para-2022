<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FiscalizaPA - Login</title>
    <style>
        :root {
            --primary: #1a472a;
            --secondary: #2d5a3d;
            --accent: #15a34a;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            display: flex; align-items: center; justify-content: center;
            min-height: 100vh; padding: 20px;
        }
        .login-container {
            background: white; padding: 40px; border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3); width: 100%; max-width: 450px;
        }
        h1 {
            color: var(--primary); margin-bottom: 10px; font-size: 1.8em;
        }
        .tagline {
            color: #666; margin-bottom: 30px; font-size: 0.9em;
        }
        .tabs {
            display: flex; gap: 10px; margin-bottom: 30px; border-bottom: 2px solid #eee;
        }
        .tab-btn {
            padding: 10px 20px; border: none; background: none; cursor: pointer;
            color: #666; font-weight: bold; border-bottom: 3px solid transparent;
        }
        .tab-btn.active {
            color: var(--accent); border-bottom-color: var(--accent);
        }
        .form-group { margin-bottom: 20px; }
        label {
            display: block; margin-bottom: 8px; color: #333; font-weight: 600;
        }
        input {
            width: 100%; padding: 12px; border: 2px solid #eee; border-radius: 8px;
            font-size: 1em; transition: border-color 0.3s;
        }
        input:focus {
            outline: none; border-color: var(--accent);
        }
        .btn {
            width: 100%; padding: 12px; border: none; border-radius: 8px;
            font-weight: bold; cursor: pointer; font-size: 1em; transition: opacity 0.3s;
        }
        .btn-primary {
            background: var(--primary); color: white;
        }
        .btn-primary:hover { opacity: 0.9; }
        .btn-stripe {
            background: white; color: #1a1f71; border: 2px solid #1a1f71;
            margin-top: 10px; display: flex; align-items: center; justify-content: center; gap: 10px;
        }
        .offer-box {
            background: #f0f9ff; border-left: 4px solid var(--accent);
            padding: 15px; margin: 20px 0; border-radius: 4px; font-size: 0.9em;
        }
        .free-offer {
            font-weight: bold; color: var(--accent);
        }
        .hidden { display: none; }
    </style>
</head>
<body>
    <div class="login-container">
        <h1>🔍 FiscalizaPA</h1>
        <p class="tagline">Fiscalização Transparente de Deputados Federais</p>

        <div class="tabs">
            <button class="tab-btn active" onclick="showTab('login')">ENTRAR</button>
            <button class="tab-btn" onclick="showTab('register')">SE REGISTRAR</button>
        </div>

        <!-- LOGIN TAB -->
        <div id="login" class="tab-content">
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="loginEmail" placeholder="seu@email.com">
            </div>
            <div class="form-group">
                <label>Senha</label>
                <input type="password" id="loginPassword" placeholder="Digite sua senha">
            </div>
            <button class="btn btn-primary" onclick="loginUser()">ENTRAR</button>
        </div>

        <!-- REGISTER TAB -->
        <div id="register" class="tab-content hidden">
            <div class="offer-box">
                <span class="free-offer">🎉 7 DIAS GRÁTIS!</span>
                <p>Se registre agora e ganhe acesso completo por 7 dias sem custo.</p>
            </div>
            <div class="form-group">
                <label>Nome Completo</label>
                <input type="text" id="regName" placeholder="Seu nome">
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="regEmail" placeholder="seu@email.com">
            </div>
            <div class="form-group">
                <label>Senha</label>
                <input type="password" id="regPassword" placeholder="Mínimo 8 caracteres">
            </div>
            <button class="btn btn-primary" onclick="registerUser()">SE REGISTRAR - 7 DIAS GRÁTIS</button>
            <button class="btn btn-stripe id="stripePaymentBtn"" onclick="processStripePayment()">
                <span>💳</span> Desbloquear Acesso Vitalício (Stripe)
            </button>
        </div>
    </div>

    <script>
        function showTab(tab) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.add('hidden'));
            document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
            document.getElementById(tab).classList.remove('hidden');
            event.target.classList.add('active');
        }

        function registerUser() {
            const name = document.getElementById('regName').value;
            const email = document.getElementById('regEmail').value;
            const password = document.getElementById('regPassword').value;

            if (!name || !email || !password || password.length < 8) {
                alert('Preencha todos os campos corretamente');
                return;
            }

            const user = {
                name, email,
                freeTrialEnd: new Date(Date.now() + 7 * 24 * 60 * 60 * 1000).toISOString(),
                status: 'free-trial',
                registeredAt: new Date().toISOString()
            };

            localStorage.setItem('fiscalizapa_user', JSON.stringify(user));
            localStorage.setItem('fiscalizapa_email', email);
            alert('✅ Registro realizado! Você tem 7 dias de acesso gratuito.\nRedirecionando...');
                        // Hide Stripe payment button for non-authorized users
            const stripeBtn = document.getElementById('stripePaymentBtn');
            if (stripeBtn && email !== 'mmbaesso@hotmail.com') {
              stripeBtn.style.display = 'none';
            }
            window.location.href = 'index.html';
        }

        function loginUser() {
            const email = document.getElementById('loginEmail').value;
            if (!email) {
                alert('Digite seu email');
                return;
            }
            localStorage.setItem('fiscalizapa_email', email);
            window.location.href = 'index.html';
        }

        function processStripePayment() {
            alert('💎 Redirecionando para Stripe...\n\nPlano: Acesso Vitalício\nPreço: R$ 99,90 (pagamento único)\n\nApós o pagamento, seu acesso será ativado permanentemente!');
            // Em produção, integrar com Stripe Checkout
            const user = {
                name: document.getElementById('regName').value,
                email: document.getElementById('regEmail').value,
                status: 'paid',
                paidAt: new Date().toISOString(),
                accessLevel: 'lifetime'
            };
            localStorage.setItem('fiscalizapa_user', JSON.stringify(user));
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
